<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Sketchfab Style</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>

AFRAME.registerComponent('gesture-handler', {

init: function () {

const el = this.el
const scene = document.querySelector('a-scene')

let scale = 1
let startScale = 1

// ROTACIÓN SUAVE
let rotX = 0
let rotY = 0

let targetRotX = 0
let targetRotY = 0

scene.addEventListener("loaded", () => {

const hammer = new Hammer(scene.canvas)

hammer.get('pinch').set({ enable: true })
hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL })

// 🔵 ROTACIÓN TIPO SKETCHFAB
hammer.on("panmove", (ev) => {

targetRotY += ev.deltaX * 0.1
targetRotX += ev.deltaY * 0.1

// limitar inclinación vertical (evitar volteo raro)
targetRotX = Math.max(-80, Math.min(80, targetRotX))

})

// 🔵 ZOOM INICIO
hammer.on("pinchstart", () => {
startScale = scale
})

// 🔵 ZOOM
hammer.on("pinchmove", (ev) => {

scale = startScale * ev.scale
scale = Math.max(0.3, Math.min(scale, 4))

el.setAttribute("scale", `${scale} ${scale} ${scale}`)

})

})

// 🔵 SUAVIZADO (INERCIA)
this.tick = function () {

rotX += (targetRotX - rotX) * 0.15
rotY += (targetRotY - rotY) * 0.15

el.setAttribute("rotation", `${rotX} ${rotY} 0`)

}

}

})

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<a-asset-item id="modelo" src="asset.glb"></a-asset-item>
</a-assets>

<!-- 🌞 ILUMINACIÓN MÁS NATURAL -->

<a-entity light="type: ambient; intensity: 0.4"></a-entity>

<a-entity light="type: hemisphere; intensity: 1; groundColor: #666"></a-entity>

<a-entity
light="type: directional; intensity: 0.6"
position="2 4 2">
</a-entity>

<a-marker type="pattern" url="marker.patt">

<a-entity
gltf-model="#modelo"
scale="1 1 1"
position="0 0 0"
gesture-handler>
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
