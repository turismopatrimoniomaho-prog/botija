<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Modelo PRO</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>

// 🎮 GESTOS
AFRAME.registerComponent('gesture-handler', {

init: function () {

const el = this.el
const scene = document.querySelector('a-scene')

let currentScale = 1
let startScale = 1

let rotationX = 0
let rotationY = 0

scene.addEventListener("loaded", () => {

const hammer = new Hammer(scene.canvas)

hammer.get('pinch').set({ enable: true })
hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL })

// 🔄 ROTACIÓN 2 EJES REAL
hammer.on("pan", (ev) => {

rotationY += ev.deltaX * 0.02
rotationX -= ev.deltaY * 0.02

// limitar inclinación vertical
rotationX = Math.max(-60, Math.min(60, rotationX))

el.setAttribute("rotation", {
x: rotationX,
y: rotationY,
z: 0
})

})

// 🔍 INICIO ZOOM
hammer.on("pinchstart", () => {
startScale = currentScale
})

// 🔍 ZOOM
hammer.on("pinch", (ev) => {

currentScale = startScale * ev.scale
currentScale = Math.max(0.3, Math.min(currentScale, 4))

el.setAttribute("scale", {
x: currentScale,
y: currentScale,
z: currentScale
})

})

})

}

})


// 🎯 CENTRADO AUTOMÁTICO (SOLUCIÓN CLAVE)
AFRAME.registerComponent('auto-center', {
init: function () {

this.el.addEventListener('model-loaded', () => {

const mesh = this.el.getObject3D('mesh')
if (!mesh) return

const box = new THREE.Box3().setFromObject(mesh)
const center = new THREE.Vector3()

box.getCenter(center)

// mover modelo al centro REAL
this.el.object3D.position.sub(center)

})

}
})

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<a-asset-item id="modelo" src="./asset.glb"></a-asset-item>
</a-assets>

<!-- 💡 ILUMINACIÓN -->
<a-entity light="type: ambient; intensity: 0.4"></a-entity>

<a-entity light="type: hemisphere; intensity: 1; groundColor: #444"></a-entity>

<a-entity 
light="type: directional; intensity: 0.5"
position="2 4 2">
</a-entity>

<!-- 📍 MARCADOR -->
<a-marker 
type="pattern" 
url="./marker.patt"
smooth="true"
smoothCount="10"
smoothTolerance="0.01"
smoothThreshold="5"
>

<!-- 🔥 PIVOTE REAL -->
<a-entity gesture-handler>

    <!-- 📦 MODELO (centrado automáticamente) -->
    <a-entity
    gltf-model="#modelo"
    auto-center
    scale="1 1 1">
    </a-entity>

</a-entity>

</a-marker>

<!-- 📷 CÁMARA -->
<a-entity camera></a-entity>

</a-scene>

</body>
</html>
