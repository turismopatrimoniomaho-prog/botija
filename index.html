<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Centro de Masa</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>

// 🎮 GESTOS (solo afectan al PIVOT)
AFRAME.registerComponent('gesture-handler', {
init: function () {

const el = this.el
const scene = document.querySelector('a-scene')

let currentScale = 1
let startScale = 1
let rotationX = 0
let rotationY = 0

scene.addEventListener("loaded", () => {

const hammer = new Hammer(scene.canvas)

hammer.get('pinch').set({ enable: true })
hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL })

hammer.on("pan", (ev) => {

rotationY += ev.deltaX * 0.02
rotationX -= ev.deltaY * 0.02

rotationX = Math.max(-60, Math.min(60, rotationX))

el.setAttribute("rotation", {
x: rotationX,
y: rotationY,
z: 0
})

})

hammer.on("pinchstart", () => {
startScale = currentScale
})

hammer.on("pinch", (ev) => {

currentScale = startScale * ev.scale
currentScale = Math.max(0.3, Math.min(currentScale, 4))

el.setAttribute("scale", {
x: currentScale,
y: currentScale,
z: currentScale
})

})

})

}
})


// 🎯 CENTRAR EN CENTRO DE MASA (SIN TOCAR ALTURA FINAL)
AFRAME.registerComponent('center-model', {
init: function () {

this.el.addEventListener('model-loaded', () => {

const mesh = this.el.getObject3D('mesh')
if (!mesh) return

const box = new THREE.Box3().setFromObject(mesh)
const center = new THREE.Vector3()

box.getCenter(center)

// mover modelo para que SU centro quede en (0,0,0)
this.el.object3D.position.set(
  -center.x,
  -center.y,
  -center.z
)

})

}
})

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<a-asset-item id="modelo" src="./asset.glb"></a-asset-item>
</a-assets>

<!-- 💡 LUCES -->
<a-entity light="type: ambient; intensity: 0.4"></a-entity>
<a-entity light="type: hemisphere; intensity: 1; groundColor: #444"></a-entity>
<a-entity light="type: directional; intensity: 0.5" position="2 4 2"></a-entity>

<a-marker type="pattern" url="./marker.patt">

<!-- 🔥 NIVEL 1: PIVOT (ROTACIÓN REAL) -->
<a-entity id="pivot" gesture-handler>

    <!-- 🔥 NIVEL 2: OFFSET (ALTURA FLOTANTE) -->
    <a-entity position="0 0.3 0"> <!-- AJUSTA ALTURA AQUÍ -->

        <!-- 🔥 NIVEL 3: MODELO CENTRADO EN SU MASA -->
        <a-entity
        gltf-model="#modelo"
        center-model
        scale="1 1 1">
        </a-entity>

    </a-entity>

</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
