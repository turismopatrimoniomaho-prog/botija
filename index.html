<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Rotación Correcta</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>

AFRAME.registerComponent('gesture-handler', {

init: function () {

const yPivot = this.el                 // rota horizontal
const xPivot = this.el.children[0]     // rota vertical
const scene = document.querySelector('a-scene')

let currentScale = 1
let startScale = 1

let rotationX = 0
let rotationY = 0

scene.addEventListener("loaded", () => {

const hammer = new Hammer(scene.canvas)

hammer.get('pinch').set({ enable: true })
hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL })

hammer.on("pan", (ev) => {

rotationY += ev.deltaX * 0.02
rotationX -= ev.deltaY * 0.02

// limitar inclinación vertical
rotationX = Math.max(-80, Math.min(80, rotationX))

// 🔵 ROTACIÓN HORIZONTAL (padre)
yPivot.setAttribute("rotation", {
x: 0,
y: rotationY,
z: 0
})

// 🔴 ROTACIÓN VERTICAL (hijo)
xPivot.setAttribute("rotation", {
x: rotationX,
y: 0,
z: 0
})

})

// ZOOM
hammer.on("pinchstart", () => {
startScale = currentScale
})

hammer.on("pinch", (ev) => {

currentScale = startScale * ev.scale
currentScale = Math.max(0.3, Math.min(currentScale, 4))

yPivot.setAttribute("scale", {
x: currentScale,
y: currentScale,
z: currentScale
})

})

})

}

})

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<a-asset-item id="modelo" src="asset.glb"></a-asset-item>
</a-assets>

<!-- LUCES -->
<a-entity light="type: ambient; intensity: 0.3"></a-entity>
<a-entity light="type: hemisphere; intensity: 1; groundColor: #444"></a-entity>
<a-entity light="type: directional; intensity: 0.4" position="2 4 2"></a-entity>

<a-marker type="pattern" url="marker.patt">

<!-- 🔵 PIVOTE Y (horizontal) -->
<a-entity gesture-handler>

    <!-- 🔴 PIVOTE X (vertical) -->
    <a-entity>

        <!-- 📦 MODELO -->
        <a-entity
        gltf-model="#modelo"
        scale="1 1 1"
        position="0 1 0">
        </a-entity>

    </a-entity>

</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
