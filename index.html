<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Control Correcto</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>

AFRAME.registerComponent('gesture-handler', {

init: function () {

const el = this.el
const scene = document.querySelector('a-scene')

let rotation = { x: 0, y: 0 }

let lastX = 0
let lastY = 0

let currentScale = 1
let startScale = 1

scene.addEventListener("loaded", () => {

const hammer = new Hammer(scene.canvas)

hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL })
hammer.get('pinch').set({ enable: true })

// inicio gesto
hammer.on("panstart", (ev) => {
lastX = ev.deltaX
lastY = ev.deltaY
})

// 🔥 ROTACIÓN TIPO TRACKBALL (SIN ERRORES)
hammer.on("pan", (ev) => {

let dx = ev.deltaX - lastX
let dy = ev.deltaY - lastY

lastX = ev.deltaX
lastY = ev.deltaY

rotation.y += dx * 0.5
rotation.x -= dy * 0.5

// 🔥 límite opcional suave (puedes quitarlo)
rotation.x = Math.max(-75, Math.min(75, rotation.x))

el.setAttribute("rotation", {
x: rotation.x,
y: rotation.y,
z: 0
})

})

// ZOOM
hammer.on("pinchstart", () => {
startScale = currentScale
})

hammer.on("pinch", (ev) => {

currentScale = startScale * ev.scale
currentScale = Math.max(0.3, Math.min(currentScale, 4))

el.setAttribute("scale", {
x: currentScale,
y: currentScale,
z: currentScale
})

})

})

}

})

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<a-asset-item id="modelo" src="asset.glb"></a-asset-item>
</a-assets>

<!-- LUCES -->
<a-entity light="type: ambient; intensity: 0.3"></a-entity>
<a-entity light="type: hemisphere; intensity: 1; groundColor: #444"></a-entity>
<a-entity light="type: directional; intensity: 0.4" position="2 4 2"></a-entity>

<a-marker type="pattern" url="marker.patt">

<!-- 🔥 UN SOLO PIVOTE (clave) -->
<a-entity gesture-handler position="0 0.3 0">

    <a-entity
    gltf-model="#modelo"
    position="0 0 0"
    scale="1 1 1">
    </a-entity>

</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
