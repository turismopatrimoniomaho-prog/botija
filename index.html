<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Control Estable Final</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>

AFRAME.registerComponent('gesture-handler', {

init: function () {

const yPivot = this.el                 // rotación horizontal
const xPivot = this.el.children[0]     // rotación vertical
const scene = document.querySelector('a-scene')

let currentScale = 1
let startScale = 1

let rotationX = 0
let rotationY = 0

let lastX = 0
let lastY = 0

scene.addEventListener("loaded", () => {

const hammer = new Hammer(scene.canvas)

hammer.get('pinch').set({ enable: true })
hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL })

// INICIO DEL GESTO
hammer.on("panstart", (ev) => {
lastX = ev.deltaX
lastY = ev.deltaY
})

// ROTACIÓN CORREGIDA
hammer.on("pan", (ev) => {

// movimiento incremental real
let deltaX = ev.deltaX - lastX
let deltaY = ev.deltaY - lastY

lastX = ev.deltaX
lastY = ev.deltaY

// rotación horizontal
rotationY += deltaX * 0.5

// 🔥 detectar orientación del modelo
let normalizedY = ((rotationY % 360) + 360) % 360
let invert = (normalizedY > 90 && normalizedY < 270)

// 🔥 corregir eje vertical dinámicamente
if (invert) {
    rotationX += deltaY * 0.5
} else {
    rotationX -= deltaY * 0.5
}

// limitar inclinación vertical
rotationX = Math.max(-60, Math.min(60, rotationX))

// aplicar rotaciones
yPivot.setAttribute("rotation", {
x: 0,
y: rotationY,
z: 0
})

xPivot.setAttribute("rotation", {
x: rotationX,
y: 0,
z: 0
})

})

// ZOOM
hammer.on("pinchstart", () => {
startScale = currentScale
})

hammer.on("pinch", (ev) => {

currentScale = startScale * ev.scale
currentScale = Math.max(0.3, Math.min(currentScale, 4))

yPivot.setAttribute("scale", {
x: currentScale,
y: currentScale,
z: currentScale
})

})

})

}

})

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<a-asset-item id="modelo" src="asset.glb"></a-asset-item>
</a-assets>

<!-- 💡 ILUMINACIÓN -->
<a-entity light="type: ambient; intensity: 0.3"></a-entity>
<a-entity light="type: hemisphere; intensity: 1; groundColor: #444"></a-entity>
<a-entity light="type: directional; intensity: 0.4" position="2 4 2"></a-entity>

<a-marker type="pattern" url="marker.patt">

<!-- 🟡 OFFSET (flotación, NO rota) -->
<a-entity position="0 0.3 0">

    <!-- 🔵 PIVOTE Y -->
    <a-entity gesture-handler>

        <!-- 🔴 PIVOTE X -->
        <a-entity>

            <!-- 📦 MODELO -->
            <a-entity
            gltf-model="#modelo"
            position="0 0 0"
            scale="1 1 1">
            </a-entity>

        </a-entity>

    </a-entity>

</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
