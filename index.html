<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Modelo Mejorado</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>

AFRAME.registerComponent('gesture-handler', {

init: function () {

const el = this.el
const scene = document.querySelector('a-scene')

let currentScale = 1
let startScale = 1

let rotationX = 0   // vertical
let rotationY = 0   // horizontal

scene.addEventListener("loaded", () => {

const hammer = new Hammer(scene.canvas)

hammer.get('pinch').set({ enable: true })
hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL })

// ROTACION 2 EJES
hammer.on("pan", (ev) => {

rotationY -= ev.deltaX * 0.02
rotationX += ev.deltaY * 0.02

// limitar rotación vertical (evita que se voltee completamente)
rotationX = Math.max(-80, Math.min(80, rotationX))

el.setAttribute("rotation", {
x: -rotationX,
y: rotationY,
z: 0
})

})

// ZOOM INICIO
hammer.on("pinchstart", () => {
startScale = currentScale
})

// ZOOM
hammer.on("pinch", (ev) => {

currentScale = startScale * ev.scale

// límites de zoom
currentScale = Math.max(0.3, Math.min(currentScale, 4))

el.setAttribute("scale", {
x: currentScale,
y: currentScale,
z: currentScale
})

})

})

}

})

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<a-asset-item id="modelo" src="asset.glb"></a-asset-item>
</a-assets>

<!-- ILUMINACION -->

<a-entity light="type: ambient; intensity: 0.3"></a-entity>

<a-entity light="type: hemisphere; intensity: 1; groundColor: #444"></a-entity>

<a-entity
light="type: directional; intensity: 0.4"
position="2 4 2">
</a-entity>

<a-marker type="pattern" url="marker.patt">

<a-entity
gltf-model="#modelo"
scale="1 1 1"
position="0 0.5 0"
gesture-handler>
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
