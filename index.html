<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Trackball REAL</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>

AFRAME.registerComponent('gesture-handler', {

init: function () {

const el = this.el
const scene = document.querySelector('a-scene')

let startVec = new THREE.Vector3()
let currentVec = new THREE.Vector3()

let currentScale = 1
let startScale = 1

// 🔵 convierte pantalla → esfera virtual
function projectOnTrackball(x, y) {

let rect = scene.canvas.getBoundingClientRect()

let nx = ( (x - rect.left) / rect.width ) * 2 - 1
let ny = -( (y - rect.top) / rect.height ) * 2 + 1

let length = nx * nx + ny * ny

let nz

if (length <= 1) {
    nz = Math.sqrt(1 - length)
} else {
    let norm = 1 / Math.sqrt(length)
    nx *= norm
    ny *= norm
    nz = 0
}

return new THREE.Vector3(nx, ny, nz)

}

scene.addEventListener("loaded", () => {

const hammer = new Hammer(scene.canvas)

hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL })
hammer.get('pinch').set({ enable: true })

// INICIO
hammer.on("panstart", (ev) => {
startVec.copy(projectOnTrackball(ev.center.x, ev.center.y))
})

// MOVIMIENTO
hammer.on("pan", (ev) => {

currentVec.copy(projectOnTrackball(ev.center.x, ev.center.y))

// eje de rotación
let axis = new THREE.Vector3().crossVectors(startVec, currentVec)

// ángulo
let angle = startVec.angleTo(currentVec)

if (axis.lengthSq() > 0.0001) {

axis.normalize()

let q = new THREE.Quaternion().setFromAxisAngle(axis, angle)

// aplicar rotación
el.object3D.quaternion.premultiply(q)

// actualizar referencia
startVec.copy(currentVec)

}

})

// ZOOM
hammer.on("pinchstart", () => {
startScale = currentScale
})

hammer.on("pinch", (ev) => {

currentScale = startScale * ev.scale
currentScale = Math.max(0.3, Math.min(currentScale, 4))

el.setAttribute("scale", {
x: currentScale,
y: currentScale,
z: currentScale
})

})

})

}

})

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<a-asset-item id="modelo" src="asset.glb"></a-asset-item>
</a-assets>

<!-- LUCES -->
<a-entity light="type: ambient; intensity: 0.3"></a-entity>
<a-entity light="type: hemisphere; intensity: 1; groundColor: #444"></a-entity>
<a-entity light="type: directional; intensity: 0.4" position="2 4 2"></a-entity>

<a-marker type="pattern" url="marker.patt">

<a-entity gesture-handler position="0 0.3 0">

    <a-entity
    gltf-model="#modelo"
    position="0 0 0"
    scale="1 1 1">
    </a-entity>

</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
